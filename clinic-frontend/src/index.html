<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ClinicFrontend</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root>
      <div *ngFor="let doctor of doctors">
        {{ doctor.name }}
        <span *ngIf="doctor.appointmentCount >= 2" style="color: red">
          (AT CAPACITY)
        </span>
      </div>
    </app-root>
  </body>
</html>
