<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h2 class="mb-0">Clinic Capacity Dashboard</h2>
    </div>
    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-light">
          <tr>
            <th>Doctor Name</th>
            <th>Total Appointments</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let doctor of doctors">
            <td>{{ doctor.name }}</td>
            <td>{{ doctor.appointmentCount }}</td>
            <td>
              <span *ngIf="doctor.appointmentCount >= 2" class="badge bg-danger">AT CAPACITY</span>
              <span *ngIf="doctor.appointmentCount < 2" class="badge bg-success">AVAILABLE</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
